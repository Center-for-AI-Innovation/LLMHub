paths:
  image_path: "/sw/llmhub/vllm.sif"
  vllm_image_path: "/sw/llmhub/vllm.sif"
  sglang_image_path: "/projects/bfmz/rohan13/containers/sglang.sif"
  cached_model_config_path: "/projects/modelcache/public/models.yaml"
  
containerization:
  module_load_cmd: ""
  module_name: "apptainer"

limits:
  max_gpus_per_node: 8
  max_num_nodes: 100
  max_cpus_per_task: 64

allowed_values:
  qos: ["normal", "high", "low"]
  partition: ["gpuA40x4", "gpuA100x4", "gpuA100x8", "gpuH200x8", "gpuA40x4-interactive", "gpuA100x4-interactive", "gpuA100x8-interactive", "gpuH200x8-interactive", "gpuA40x4-preempt", "gpuA100x4-preempt"]
  resource_type: ["nvidia_a40", "nvidia_a100", "h200"]

required_args:
  account: "VEC_INF_ACCOUNT"
  work_dir: "VEC_INF_WORK_DIR"

default_args:
  account: "bfmz-delta-gpu"
  cpus_per_task: "16"
  mem_per_node: "64G"
  time: "00:10:00"
  qos: ""
  partition: "gpuA40x4"
  resource_type: "nvidia_a40"
  exclude: ""
  nodelist: ""
  bind: "/projects/modelcache/public/huggingface:/root/.cache/huggingface,/projects/modelcache/public/torch_inductor:/root/.cache/torch_inductor"
  venv: "apptainer"
  data_type: "auto"
  log_dir: "/projects/llmhub"
  model_weights_parent_dir: "/projects/modelcache/public"
