paths:
  image_path: "/projects/bfmz/rohan13/containers/vllm.sif"
  vllm_image_path: "/projects/bfmz/rohan13/containers/vllm.sif"
  sglang_image_path: "/projects/bfmz/rohan13/containers/sglang.sif"
  cached_model_config_path: "/projects/bfmz/rohan13/cached_model_config.yaml"
  
containerization:
  module_load_cmd: ""
  module_name: "apptainer"

limits:
  max_gpus_per_node: 8
  max_num_nodes: 100
  max_cpus_per_task: 64

allowed_values:
  qos: ["normal", "high", "low"]
  partition: ["gpuA40x4", "gpuA100x4", "gpuA100x8", "gpuH200x8", "gpuA40x4-interactive", "gpuA100x4-interactive", "gpuA100x8-interactive", "gpuH200x8-interactive", "gpuA40x4-preempt", "gpuA100x4-preempt"]
  resource_type: ["A100", "H100", "V100", "A40", "l40s", "nvidia_a40"]

required_args:
  account: "VEC_INF_ACCOUNT"
  work_dir: "VEC_INF_WORK_DIR"

default_args:
  account: "bfmz-delta-gpu"
  cpus_per_task: "16"
  mem_per_node: "64G"
  time: "00:10:00"
  qos: ""
  partition: "gpuA40x4"
  resource_type: "nvidia_a40"
  exclude: ""
  nodelist: ""
  bind: "/projects/bfmz/rohan13/huggingface:/root/.cache/huggingface,/projects/bfmz/rohan13/torch_cache:/root/.cache/torch_inductor"
  venv: "apptainer"
  data_type: "auto"
  log_dir: "/projects/bfmz/svcdeltallmhub/Delta-deployment/.vec-inf-logs" # TODO: Change to log directory based on the environment/user
  model_weights_parent_dir: "/model-weights"
