# Pre-commit hooks for local linting/formatting.
# Install once per clone:  pre-commit install
# Run against everything:  pre-commit run --all-files
#
# Backend hooks (black/isort/flake8) are scoped to backend/**; the frontend
# eslint hook is scoped to frontend/**.
# Tool versions are pinned to match the GitHub Actions workflow.

repos:
  # ----- Backend (Python) -----
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.5.1
    hooks:
      - id: black
        files: ^backend/
        args: ["--line-length", "88"]

  - repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
      - id: isort
        files: ^backend/
        args: ["--profile", "black", "--line-length", "88"]

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^backend/
        args: ["--config=backend/.flake8"]

  # ----- Frontend (TypeScript/JavaScript) -----
  - repo: local
    hooks:
      - id: frontend-eslint
        name: eslint (frontend)
        entry: pnpm --dir frontend lint:fix
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx|mjs|cjs)$
        pass_filenames: false

      # Not run automatically on commits. Run on demand with:
      #   pre-commit run frontend-contrast-check --hook-stage manual
      - id: frontend-contrast-check
        name: contrast check (playwright + axe)
        entry: pnpm --dir frontend test:contrast
        language: system
        pass_filenames: false
        stages: [manual]
